name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download dependencies
        run: go mod download
      - name: Run release gates
        run: |
          ./scripts/check_public_surface.sh
          ./scripts/run_go_tests.sh
          python -m pip install --upgrade pip build twine
          python -m pip install -e "sdk/python[async,dev]"
          make test-python
          make docs-check
      - name: Build server binaries
        run: |
          mkdir -p dist/bin
          GOOS=linux GOARCH=amd64 go build -o dist/bin/agent-server-linux-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o dist/bin/agent-server-darwin-arm64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o dist/bin/agent-server-windows-amd64.exe ./cmd/server
      - name: Build Python artifacts
        run: python -m build sdk/python --sdist --wheel --outdir dist/python
      - name: Validate Python artifacts
        run: python -m twine check dist/python/*
      - name: Verify LICENSE is packaged
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          dist = Path("dist/python")
          wheel = next(dist.glob("*.whl"))
          sdist = next(dist.glob("*.tar.gz"))

          with zipfile.ZipFile(wheel) as zf:
              if not any(name.endswith("LICENSE") or "/licenses/LICENSE" in name for name in zf.namelist()):
                  raise SystemExit("wheel is missing LICENSE")

          with tarfile.open(sdist, "r:gz") as tf:
              if not any(name.endswith("/LICENSE") for name in tf.getnames()):
                  raise SystemExit("sdist is missing LICENSE")
          PY
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/*
            dist/python/*
      - name: Publish Python SDK to PyPI
        if: ${{ vars.PYPI_PUBLISH == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python
