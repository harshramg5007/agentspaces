name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@latest
      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . --no-banner --redact --exit-code 1
