apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentspaces.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentspaces.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentspaces.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: agent-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--store-type"
            - "{{ .Values.env.storeType }}"
            - "--postgres-host"
            - "{{ .Values.env.postgresHost }}"
            - "--postgres-port"
            - "{{ .Values.env.postgresPort }}"
            - "--postgres-user"
            - "{{ .Values.env.postgresUser }}"
            - "--postgres-password"
            - "{{ .Values.env.postgresPassword }}"
            - "--postgres-database"
            - "{{ .Values.env.postgresDatabase }}"
            - "--postgres-queue-claim-mode"
            - "{{ .Values.env.postgresQueueClaimMode }}"
            - "--http-addr"
            - ":8080"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
{{ toYaml .Values.resources | indent 12 }}
