services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_space
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      [
        "./agent-server",
        "--store-type", "postgres",
        "--postgres-host", "postgres",
        "--postgres-port", "5432",
        "--postgres-user", "postgres",
        "--postgres-password", "postgres",
        "--postgres-database", "agent_space",
        "--postgres-queue-claim-mode", "strict",
        "--http-addr", ":8080"
      ]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-web-search:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["python", "mcp_web_search_server.py"]
    ports:
      - "8001:8001"

  mcp-code-review:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: ["python", "mcp_code_review_server.py"]
    ports:
      - "8002:8002"

  worker-web-search:
    build:
      context: .
      dockerfile: Dockerfile.python
    command:
      [
        "python",
        "tool_worker.py",
        "--tool", "web_search",
        "--mcp-url", "http://mcp-web-search:8001/mcp",
        "--ts-url", "http://agent-server:8080/api/v1"
      ]
    depends_on:
      agent-server:
        condition: service_healthy
      mcp-web-search:
        condition: service_started
    volumes:
      - ../../sdk/python:/app/sdk/python:ro

  worker-code-review:
    build:
      context: .
      dockerfile: Dockerfile.python
    command:
      [
        "python",
        "tool_worker.py",
        "--tool", "code_review",
        "--mcp-url", "http://mcp-code-review:8002/mcp",
        "--ts-url", "http://agent-server:8080/api/v1"
      ]
    depends_on:
      agent-server:
        condition: service_healthy
      mcp-code-review:
        condition: service_started
    volumes:
      - ../../sdk/python:/app/sdk/python:ro
