services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-agent_space}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STORE_TYPE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-agent_space}
      POSTGRES_QUEUE_CLAIM_MODE: ${POSTGRES_QUEUE_CLAIM_MODE:-strict}
      HTTP_ADDR: :8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-false}
    ports:
      - "127.0.0.1:${AGENT_SPACE_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
